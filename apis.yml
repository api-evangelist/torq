apis:
  - name: Torq REST API
    description: >
      The Torq REST API allows programmatic management of workspace resources
      including workflows, users, secrets, triggers, and webhooks. API keys are
      workspace-scoped and support both US and EU regional endpoints. The API
      enables automation of security operations and integration with external
      systems for incident response and threat management.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
