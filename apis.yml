aid: torq
name: Torq
description: >
  Torq is an enterprise-grade AI-driven hyper-automation security platform that
  enables security operations teams to triage, investigate, and respond to threats
  at machine speed. The REST API provides programmatic management of workspace
  resources including workflows, users, secrets, triggers, webhooks, and automated
  incident response playbooks. Torq supports no-code, low-code, and full-code
  security automation with 300+ integrations and regional endpoints in the US and EU.
